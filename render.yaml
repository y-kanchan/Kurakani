services:
  # The Backend Web Service
  - type: web
    name: kurakani-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # User must provide this in Render Dashboard
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://kurakani-frontend.onrender.com

  # The Frontend Static Site
  - type: web
    name: kurakani-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /api/*
        destination: https://kurakani-backend.onrender.com/api/*
      - type: rewrite
        source: /uploads/*
        destination: https://kurakani-backend.onrender.com/uploads/*
